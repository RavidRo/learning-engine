version: "3"

vars:
  HOST: '{{.HOST | default "127.0.0.1"}}'
  PORT: '{{.PORT | default "8765"}}'
  WEB_HOST: '{{.WEB_HOST | default "127.0.0.1"}}'
  WEB_PORT: '{{.WEB_PORT | default "5173"}}'
  DAYS: '{{.DAYS | default "14"}}'

includes:
  backend:
    taskfile: ./backend/Taskfile.yml
    dir: ./backend
    vars:
      HOST: "{{.HOST}}"
      PORT: "{{.PORT}}"
      DAYS: "{{.DAYS}}"
  web:
    taskfile: ./webapp/Taskfile.yml
    dir: ./webapp
    vars:
      WEB_HOST: "{{.WEB_HOST}}"
      WEB_PORT: "{{.WEB_PORT}}"

tasks:
  default:
    desc: Show available project tasks
    cmds:
      - task --list

  check:
    desc: Run backend and webapp checks
    cmds:
      - task: backend:check
      - task: web:check

  format:
    desc: Run backend and webapp formatting
    cmds:
      - task: backend:format
      - task: web:format

  up:
    desc: Start the development Docker Compose stack
    cmds:
      - task: compose:up

  down:
    desc: Stop Docker Compose services for both modes
    cmds:
      - task: compose:down

  compose:up:
    desc: Start backend plus the Vite dev server with Docker Compose
    cmds:
      - docker compose -f compose.yaml --profile dev up --build

  compose:preview:
    desc: Start backend plus the production frontend preview with Docker Compose
    cmds:
      - docker compose -f compose.yaml --profile preview up --build

  compose:down:
    desc: Stop the development Docker Compose stack
    cmds:
      - docker compose -f compose.yaml down

  compose:config:
    desc: Validate development Docker Compose configuration
    cmds:
      - docker compose -f compose.yaml --profile dev config

  compose:preview:config:
    desc: Validate production frontend preview Docker Compose configuration
    cmds:
      - docker compose -f compose.yaml --profile preview config
