version: "3"

vars:
  HOST: '{{.HOST | default "127.0.0.1"}}'
  PORT: '{{.PORT | default "8765"}}'
  WEB_HOST: '{{.WEB_HOST | default "127.0.0.1"}}'
  WEB_PORT: '{{.WEB_PORT | default "5173"}}'
  DAYS: '{{.DAYS | default "14"}}'

includes:
  backend:
    taskfile: ./backend/Taskfile.yml
    dir: ./backend
    vars:
      HOST: "{{.HOST}}"
      PORT: "{{.PORT}}"
      DAYS: "{{.DAYS}}"
  web:
    taskfile: ./webapp/Taskfile.yml
    dir: ./webapp
    vars:
      WEB_HOST: "{{.WEB_HOST}}"
      WEB_PORT: "{{.WEB_PORT}}"

tasks:
  default:
    desc: Show available project tasks
    cmds:
      - task --list

  check:
    desc: Run backend and webapp checks
    cmds:
      - task: backend:check
      - task: web:check

  format:
    desc: Run backend and webapp formatting
    cmds:
      - task: backend:format
      - task: web:format

  dev:
    desc: Start the development Docker Compose stack
    cmds:
      - task: compose:dev:up

  prod:
    desc: Start the production Docker Compose stack
    cmds:
      - task: compose:prod:up

  up:
    desc: Start the development Docker Compose stack (alias for compose:dev:up)
    cmds:
      - task: compose:dev:up

  down:
    desc: Stop Docker Compose services for both modes
    cmds:
      - task: compose:dev:down
      - task: compose:prod:down

  compose:dev:up:
    desc: Start backend plus the Vite dev server with Docker Compose
    cmds:
      - docker compose -f compose.dev.yaml up --build

  compose:dev:down:
    desc: Stop the development Docker Compose stack
    cmds:
      - docker compose -f compose.dev.yaml down

  compose:dev:config:
    desc: Validate development Docker Compose configuration
    cmds:
      - docker compose -f compose.dev.yaml config

  compose:prod:up:
    desc: Start backend plus the production frontend with Docker Compose
    cmds:
      - docker compose -f compose.prod.yaml up --build

  compose:prod:down:
    desc: Stop the production Docker Compose stack
    cmds:
      - docker compose -f compose.prod.yaml down

  compose:prod:config:
    desc: Validate production Docker Compose configuration
    cmds:
      - docker compose -f compose.prod.yaml config

  compose:config:
    desc: Validate development and production Docker Compose configurations
    cmds:
      - task: compose:dev:config
      - task: compose:prod:config
