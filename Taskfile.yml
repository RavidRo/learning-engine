version: "3"

vars:
  HOST: '{{.HOST | default "127.0.0.1"}}'
  PORT: '{{.PORT | default "8765"}}'
  WEB_HOST: '{{.WEB_HOST | default "127.0.0.1"}}'
  WEB_PORT: '{{.WEB_PORT | default "5173"}}'
  DAYS: '{{.DAYS | default "14"}}'

includes:
  backend:
    taskfile: ./backend/Taskfile.yml
    dir: ./backend
    vars:
      HOST: "{{.HOST}}"
      PORT: "{{.PORT}}"
      DAYS: "{{.DAYS}}"
  web:
    taskfile: ./webapp/Taskfile.yml
    dir: ./webapp
    vars:
      WEB_HOST: "{{.WEB_HOST}}"
      WEB_PORT: "{{.WEB_PORT}}"

tasks:
  default:
    desc: Show available project tasks
    cmds:
      - task --list

  check:
    desc: Run backend and webapp checks
    cmds:
      - task: backend:check
      - task: web:check
  
  format:
    desc: Run backend and webapp formatting
    cmds:
      - task: backend:format
      - task: web:format

  up:
    desc: Run backend and frontend with Docker Compose
    cmds:
      - docker compose up --build

  down:
    desc: Stop Docker Compose services
    cmds:
      - docker compose down

  compose:config:
    desc: Validate Docker Compose configuration
    cmds:
      - docker compose config
