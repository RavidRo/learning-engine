# Render Blueprint for the hosted Signal Garden stack.
# See docs/deployment/render.md before applying this Blueprint.
services:
  - type: web
    name: learning-engine-backend
    runtime: docker
    rootDir: backend
    dockerfilePath: ./Dockerfile
    dockerContext: .
    plan: free
    # Frankfurt is the closest Render service/datastore region to Israel.
    region: frankfurt
    healthCheckPath: /api/health
    autoDeployTrigger: commit
    envVars:
      # The backend Dockerfile currently runs uvicorn on port 8765.
      - key: PORT
        value: 8765
      # Reserved for the planned Postgres persistence implementation.
      - key: DATABASE_URL
        fromDatabase:
          name: learning-engine-db
          property: connectionString
      # Optional provider credentials. Fill these in the Render Dashboard if needed.
      - key: X_BEARER_TOKEN
        sync: false
      - key: SPOTIFY_ACCESS_TOKEN
        sync: false
      # Clerk authentication. These values are public verifier configuration, not secrets.
      - key: CLERK_ISSUER
        value: https://assured-gar-54.clerk.accounts.dev
      - key: CLERK_JWKS_URL
        value: https://assured-gar-54.clerk.accounts.dev/.well-known/jwks.json
      - key: CLERK_AUTHORIZED_PARTIES
        value: https://learning-engine-frontend.onrender.com
      # MCP browser-origin protection. Auth uses Clerk session bearer tokens.
      - key: MCP_ALLOWED_ORIGINS
        value: https://learning-engine-frontend.onrender.com
      - key: MCP_ALLOWED_HOSTS
        value: learning-engine-backend.onrender.com

  - type: web
    name: learning-engine-frontend
    runtime: static
    rootDir: webapp
    buildCommand: pnpm install --frozen-lockfile && pnpm run build
    staticPublishPath: ./dist
    autoDeployTrigger: commit
    envVars:
      - key: VITE_CLERK_PUBLISHABLE_KEY
        value: pk_test_YXNzdXJlZC1nYXItNTQuY2xlcmsuYWNjb3VudHMuZGV2JA
    routes:
      # Keep browser requests same-origin by proxying API calls from the static site
      # to the public backend service. If Render assigns a different backend URL,
      # update these destinations in the Render Dashboard after the first sync.
      - type: rewrite
        source: /api/*
        destination: https://learning-engine-backend.onrender.com/api/*
      - type: rewrite
        source: /api
        destination: https://learning-engine-backend.onrender.com/api
      - type: rewrite
        source: /mcp
        destination: https://learning-engine-backend.onrender.com/mcp
      - type: rewrite
        source: /mcp/*
        destination: https://learning-engine-backend.onrender.com/mcp/*
      # Support client-side routing for the React/Vite app.
      - type: rewrite
        source: /*
        destination: /index.html

databases:
  - name: learning-engine-db
    plan: free
    # Keep the database in the same region as the backend service.
    region: frankfurt
    databaseName: learning_engine
    user: learning_engine
