# See https://docs.contextive.tech/community/guides/setting-up-glossaries/ for detailed guidance on where to put this file and setting up the context.
# See https://docs.contextive.tech/community/guides/defining-terminology/ for detailed guidance on defining your terminology.
contexts:
  - name: Learning Engine
    domainVisionStatement: Maintain local, user-owned learning priorities that can be collected into useful briefings.
    terms:
      - name: Interest
        definition: A user-owned learning topic tracked by the Learning Engine, including its name, description, priority, enabled state, and attached sources.
        examples:
          - An interest can be a person, organization, subject, specific technology, or other topic.
          - Hermes reads enabled interests to prepare an evening briefing.
      - name: Source
        definition: A collection endpoint attached to an interest that the Learning Engine can collect updates from.
        examples:
          - A TypeScript interest can include the official website page and the TypeScript dev blog RSS feed as sources.
          - Source types currently supported by collection are feeds, pages, YouTube channels, Twitter accounts, and Spotify podcasts.
