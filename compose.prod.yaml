name: learning-engine-prod

services:
  backend:
    build:
      context: ./backend
    environment:
      DATABASE_URL: postgresql+psycopg://learning_engine:learning_engine@postgres:5432/learning_engine
    ports:
      - "8765:8765"
    volumes:
      - ./backend/data:/app/data:ro
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:18-alpine
    environment:
      POSTGRES_DB: learning_engine
      POSTGRES_USER: learning_engine
      POSTGRES_PASSWORD: learning_engine
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U learning_engine -d learning_engine"]
      interval: 5s
      timeout: 5s
      retries: 5

  frontend:
    build:
      context: ./webapp
      target: prod
    ports:
      - "8080:80"
    depends_on:
      - backend

volumes:
  postgres-data:
