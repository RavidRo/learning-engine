name: learning-engine-dev

x-clerk-publishable-key: &clerk-publishable-key ${VITE_CLERK_PUBLISHABLE_KEY:-pk_test_YXNzdXJlZC1nYXItNTQuY2xlcmsuYWNjb3VudHMuZGV2JA}
x-clerk-issuer: &clerk-issuer ${CLERK_ISSUER:-https://assured-gar-54.clerk.accounts.dev}
x-clerk-jwks-url: &clerk-jwks-url ${CLERK_JWKS_URL:-https://assured-gar-54.clerk.accounts.dev/.well-known/jwks.json}

services:
  backend:
    build:
      context: ./backend
    environment:
      DATABASE_URL: postgresql+psycopg://learning_engine:learning_engine@postgres:5432/learning_engine
      CLERK_ISSUER: *clerk-issuer
      CLERK_JWKS_URL: *clerk-jwks-url
      CLERK_AUTHORIZED_PARTIES: ${CLERK_AUTHORIZED_PARTIES:-http://127.0.0.1:5173,http://127.0.0.1:5174,http://localhost:5173,http://localhost:5174}
      MCP_ALLOWED_HOSTS: backend:8765,127.0.0.1:8765,localhost:8765
    ports:
      - "8765:8765"
    volumes:
      - ./backend/data:/app/data:ro
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:18-alpine
    environment:
      POSTGRES_DB: learning_engine
      POSTGRES_USER: learning_engine
      POSTGRES_PASSWORD: learning_engine
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U learning_engine -d learning_engine"]
      interval: 5s
      timeout: 5s
      retries: 5

  frontend:
    profiles:
      - dev
    build:
      context: ./webapp
      target: dev
    environment:
      VITE_BACKEND_ORIGIN: http://backend:8765
      VITE_CLERK_PUBLISHABLE_KEY: *clerk-publishable-key
    ports:
      - "5173:5173"
    volumes:
      - ./webapp/index.html:/app/index.html:ro
      - ./webapp/public:/app/public:ro
      - ./webapp/src:/app/src
      - ./webapp/tsconfig.app.json:/app/tsconfig.app.json:ro
      - ./webapp/tsconfig.json:/app/tsconfig.json:ro
      - ./webapp/tsconfig.node.json:/app/tsconfig.node.json:ro
      - ./webapp/vite.config.ts:/app/vite.config.ts:ro
    depends_on:
      - backend

  frontend-preview:
    profiles:
      - preview
    build:
      context: ./webapp
      target: prod
      args:
        VITE_CLERK_PUBLISHABLE_KEY: *clerk-publishable-key
    ports:
      - "4173:80"
    depends_on:
      - backend

volumes:
  postgres-data:
